<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CineVault — Movie Listings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/modal.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/toast.css" />
</head>
<body>

  <!-- LOADING SCREEN -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loader-inner">
      <div class="loader-logo">🎬</div>
      <div class="loader-bar"><div class="loader-fill" id="loaderFill"></div></div>
      <p class="loader-text" id="loaderText">Loading CineVault…</p>
    </div>
  </div>

  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">🎬 CineVault</div>
      <nav class="nav-links">
        <a href="#movieGrid">Movies</a>
        <a href="#trendingSection">Trending</a>
        <a href="#topRatedSection">Top Rated</a>
        <a href="#" id="navWatchlistBtn">
          Watchlist <span class="watchlist-badge" id="navWatchlistCount">0</span>
        </a>
      </nav>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
    </div>
  </header>

  <!-- ANIMATED HERO -->
  <section class="hero" id="heroSection">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content" id="heroContent">
      <p class="hero-eyebrow">⭐ Featured Tonight</p>
      <h1 class="hero-title" id="heroTitle">—</h1>
      <div class="hero-tags" id="heroTags"></div>
      <p class="hero-desc" id="heroDesc"></p>
      <div class="hero-actions">
        <button class="btn-primary" id="heroTrailerBtn">▶ Watch Trailer</button>
        <button class="btn-secondary" id="heroWatchlistBtn">＋ Watchlist</button>
      </div>
    </div>
    <div class="hero-dots" id="heroDots"></div>
  </section>

  <!-- TRENDING -->
  <section class="section-block" id="trendingSection">
    <div class="section-header">
      <h2 class="section-title">🔥 Trending Now</h2>
    </div>
    <div class="horizontal-scroll" id="trendingScroll"></div>
  </section>

  <!-- TOP RATED -->
  <section class="section-block" id="topRatedSection">
    <div class="section-header">
      <h2 class="section-title">🏆 Top Rated</h2>
    </div>
    <div class="horizontal-scroll" id="topRatedScroll"></div>
  </section>

  <!-- SEARCH & FILTER -->
  <section class="controls-bar" id="allMoviesAnchor">
    <div class="controls-inner">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Search movies…" />
      </div>
      <div class="filters">
        <select id="genreFilter">
          <option value="">All Genres</option>
          <option value="Action">Action</option>
          <option value="Drama">Drama</option>
          <option value="Sci-Fi">Sci-Fi</option>
          <option value="Comedy">Comedy</option>
          <option value="Thriller">Thriller</option>
          <option value="Animation">Animation</option>
          <option value="Horror">Horror</option>
        </select>
        <select id="yearFilter">
          <option value="">All Years</option>
          <option value="2024">2024</option>
          <option value="2023">2023</option>
          <option value="2022">2022</option>
          <option value="2021">2021</option>
          <option value="2019">2019</option>
          <option value="2018">2018</option>
          <option value="2017">2017</option>
        </select>
        <select id="ratingFilter">
          <option value="">All Ratings</option>
          <option value="4">4★ & above</option>
          <option value="3">3★ & above</option>
          <option value="2">2★ & above</option>
        </select>
      </div>
    </div>
  </section>

  <div class="results-label">
    <span id="resultsCount">Showing all movies</span>
  </div>

  <!-- SKELETON GRID -->
  <div class="movie-grid" id="skeletonGrid"></div>

  <!-- MOVIE GRID -->
  <main class="movie-grid hidden" id="movieGrid"></main>

  <!-- PAGINATION -->
  <div class="pagination" id="pagination"></div>

  <!-- EMPTY STATE -->
  <div class="empty-state hidden" id="emptyState">
    <p>🎥 No movies match your search.</p>
    <button onclick="resetFilters()">Clear Filters</button>
  </div>

  <!-- MOVIE DETAIL MODAL -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal-box" id="modalBox">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

  <!-- TRAILER MODAL -->
  <div class="trailer-overlay hidden" id="trailerOverlay">
    <div class="trailer-box">
      <button class="trailer-close" id="trailerClose">✕</button>
      <div class="trailer-frame-wrap">
        <iframe id="trailerFrame" src="" frameborder="0" allowfullscreen
          allow="autoplay; encrypted-media; picture-in-picture"></iframe>
      </div>
    </div>
  </div>

  <!-- WATCHLIST SIDE PANEL -->
  <div class="watchlist-backdrop hidden" id="watchlistBackdrop"></div>
  <aside class="watchlist-panel hidden" id="watchlistPanel">
    <div class="watchlist-header">
      <h2>My Watchlist</h2>
      <button class="watchlist-close" id="watchlistClose">✕</button>
    </div>
    <div class="watchlist-list" id="watchlistList">
      <p class="watchlist-empty">No movies saved yet.</p>
    </div>
  </aside>

  <footer class="site-footer">
    <p>© 2025 CineVault · Internship Project · Data powered by TMDB</p>
  </footer>

  <!-- JS FILES — order matters -->
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/rating.js"></script>
  <script src="js/watchlist.js"></script>
  <script src="js/trailer.js"></script>
  <script src="js/filter.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/hero.js"></script>
  <script src="js/pagination.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
